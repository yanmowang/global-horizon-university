<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Preview</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .container {
            background-color: white;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 1240px;
        }
        h1 {
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Certificate Preview</h1>
    <p>This is a live preview of the generated certificate SVG structure.</p>
    <div class="container">
        <!-- SVG Content from Controller -->
        <svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
          <!-- 米色背景 -->
          <rect width="1200" height="900" fill="#FFFEF0" />
          
          <!-- 星形装饰图案 - 淡金色背景装饰 -->
          <defs>
            <pattern id="starPattern" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
              <path d="M100,10 L110,40 L140,40 L115,60 L125,90 L100,75 L75,90 L85,60 L60,40 L90,40 Z" fill="#C19A49" opacity="0.08" />
            </pattern>
          </defs>
          <rect width="1200" height="900" fill="url(#starPattern)" />
          
          <!-- 金色边框 -->
          <rect x="20" y="20" width="1160" height="860" fill="none" stroke="#C19A49" stroke-width="5" />
          <rect x="40" y="40" width="1120" height="820" fill="none" stroke="#C19A49" stroke-width="1" />
          
          <!-- 角落装饰 -->
          <path d="M20,20 L70,20 L70,25 L25,25 L25,70 L20,70 Z" fill="#C19A49" />
          <path d="M1180,20 L1130,20 L1130,25 L1175,25 L1175,70 L1180,70 Z" fill="#C19A49" />
          <path d="M20,880 L70,880 L70,875 L25,875 L25,830 L20,830 Z" fill="#C19A49" />
          <path d="M1180,880 L1130,880 L1130,875 L1175,875 L1175,830 L1180,830 Z" fill="#C19A49" />
          
          <!-- 顶部校徽 - 已移除 -->
          <!-- <image x="550" y="40" width="100" height="100" href="/images/logo/logo.svg" /> -->
          
          <!-- 学校名称 - 上移 -->
          <text x="600" y="100" font-family="Times New Roman, serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#000000">STRATFORD INTERNATIONAL UNIVERSITY</text>
          
          <!-- 证书标题 - 显著的金色 - 上移 -->
          <text x="600" y="170" font-family="Times New Roman, serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#C19A49">CERTIFICATE OF COMPLETION</text>
          
          <!-- 证书文本 - 上移 -->
          <text x="600" y="240" font-family="Times New Roman, serif" font-size="20" text-anchor="middle" fill="#333333">The Stratford International University hereby certifies that</text>
          
          <!-- 接收者姓名 - 大号粗体 - 上移 -->
          <text x="600" y="300" font-family="Times New Roman, serif" font-size="38" font-weight="bold" font-style="italic" text-anchor="middle" fill="#000000">John Doe</text>
          
          <!-- 学位文本 - 上移 -->
          <text x="600" y="350" font-family="Times New Roman, serif" font-size="20" text-anchor="middle" fill="#333333">has fulfilled the requirements for the degree of</text>
          
          <!-- 学位名称 - 金色斜体 - 上移 -->
          <text x="600" y="410" font-family="Times New Roman, serif" font-size="34" font-style="italic" font-weight="bold" text-anchor="middle" fill="#C19A49">Master of Business Administration</text>
          
          <!-- 附加文本 - 上移 -->
          <text x="600" y="470" font-family="Times New Roman, serif" font-size="20" text-anchor="middle" fill="#333333">and is awarded this Certificate of Completion with all rights, privileges, and honors appertaining thereto.</text>
          
          <!-- 荣誉标签 -->
          <text id="cert-honors" x="600" y="520" font-family="Times New Roman, serif" font-size="22" font-style="italic" text-anchor="middle" fill="#C19A49">Cum Honore</text>
          
          <!-- 日期文本 - 上移 -->
          <text x="600" y="560" font-family="Times New Roman, serif" font-size="20" text-anchor="middle" fill="#333333">Awarded Date</text>
          <text id="cert-date" x="600" y="595" font-family="Times New Roman, serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#333333">July 15, 2024</text>
          
          <!-- 签名区域 - 增大签名尺寸 -->
          <image x="190" y="620" width="180" height="80" href="/images/signatures/president.svg" />
          <line x1="150" y1="710" x2="400" y2="710" stroke="#333333" stroke-width="1" />
          <text x="275" y="730" font-family="Times New Roman, serif" font-size="16" text-anchor="middle" fill="#333333">Prof. Dr. Linda Foster</text>
          <text x="275" y="750" font-family="Times New Roman, serif" font-size="16" text-anchor="middle" fill="#333333">University President</text>
          
          <image x="830" y="620" width="180" height="80" href="/images/signatures/director.svg" />
          <line x1="750" y1="710" x2="1000" y2="710" stroke="#333333" stroke-width="1" />
          <text x="875" y="730" font-family="Times New Roman, serif" font-size="16" text-anchor="middle" fill="#333333">Prof. Dr. James Carpenter</text>
          <text x="875" y="750" font-family="Times New Roman, serif" font-size="16" text-anchor="middle" fill="#333333">Director, MBA Program</text>
          
          <!-- 底部校徽 - 替代原印章位置 -->
          <image x="550" y="600" width="100" height="100" href="/images/logo/logo.svg" />
          
          <!-- 原印章代码已移除 -->
          
          <!-- 证书编号 - 放在底部中央 -->
          <text x="600" y="830" font-family="Times New Roman, serif" font-size="12" text-anchor="middle" fill="#333333">Certificate ID: SIU-2024-TEST-1234</text>
        </svg>
    </div>
    <script>
        // 动态更新日期，模拟真实环境
        const dateElement = document.getElementById('cert-date');
        if (dateElement) {
            const today = new Date().toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            dateElement.textContent = today;
        }
    </script>
</body>
</html>
