  <!-- 建筑细节 - 窗户和门 -->
  <rect x="320" y="230" width="40" height="60" fill="#9ABED8"/>
  <rect x="380" y="230" width="40" height="60" fill="#9ABED8"/>
  <rect x="440" y="230" width="40" height="60" fill="#9ABED8"/>
  <rect x="500" y="230" width="40" height="60" fill="#9ABED8"/>
  <rect x="560" y="230" width="80" height="120" fill="#9ABED8"/>
  <rect x="660" y="230" width="40" height="60" fill="#9ABED8"/>
  <rect x="720" y="230" width="40" height="60" fill="#9ABED8"/>
  <rect x="780" y="230" width="40" height="60" fill="#9ABED8"/>
  <rect x="840" y="230" width="40" height="60" fill="#9ABED8"/>
  
