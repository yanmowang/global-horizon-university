  <polygon points="550,450 650,450 800,600 400,600" fill="#E2DED5"/>
  
  <!-- 路径装饰 - 地毯图案 -->
  <rect x="550" y="460" width="100" height="20" fill="#8A3324"/>
  <rect x="545" y="490" width="110" height="20" fill="#8A3324"/>
  <rect x="540" y="520" width="120" height="20" fill="#8A3324"/>
  <rect x="535" y="550" width="130" height="20" fill="#8A3324"/>
  <rect x="530" y="580" width="140" height="20" fill="#8A3324"/>
  
  <!-- 地毯装饰图案 -->
  <path d="M555,470 L555,480 L565,480 L565,470 Z" fill="#D4A017"/>
  <path d="M580,470 L580,480 L590,480 L590,470 Z" fill="#D4A017"/>
  <path d="M605,470 L605,480 L615,480 L615,470 Z" fill="#D4A017"/>
  <path d="M630,470 L630,480 L640,480 L640,470 Z" fill="#D4A017"/>
  
  <path d="M550,500 L550,510 L560,510 L560,500 Z" fill="#D4A017"/>
  <path d="M575,500 L575,510 L585,510 L585,500 Z" fill="#D4A017"/>
  <path d="M600,500 L600,510 L610,510 L610,500 Z" fill="#D4A017"/>
  <path d="M625,500 L625,510 L635,510 L635,500 Z" fill="#D4A017"/>
  <path d="M645,500 L645,510 L655,510 L655,500 Z" fill="#D4A017"/>
  
