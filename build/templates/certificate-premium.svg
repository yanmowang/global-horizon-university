<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <!-- 米色背景 -->
  <rect width="1200" height="900" fill="#FFFEF0" />
  
  <!-- 金色边框 -->
  <rect x="20" y="20" width="1160" height="860" fill="none" stroke="#C19A49" stroke-width="5" />
  <rect x="40" y="40" width="1120" height="820" fill="none" stroke="#C19A49" stroke-width="1" />
  
  <!-- 角落装饰 -->
  <path d="M40,40 L90,40 L90,45 L45,45 L45,90 L40,90 Z" fill="#C19A49" />
  <path d="M1160,40 L1110,40 L1110,45 L1155,45 L1155,90 L1160,90 Z" fill="#C19A49" />
  <path d="M40,860 L90,860 L90,855 L45,855 L45,810 L40,810 Z" fill="#C19A49" />
  <path d="M1160,860 L1110,860 L1110,855 L1155,855 L1155,810 L1160,810 Z" fill="#C19A49" />

  <!-- 顶部校徽 - 调大, 调整位置 -->
  <image x="540" y="40" width="120" height="120" href="/images/logo/logo.svg" />

  <!-- 学校名称 - 黑色, 下移 -->
  <text x="600" y="200" font-family="Times New Roman, serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#000000">STRATFORD INTERNATIONAL UNIVERSITY</text>
  
  <!-- 证书标题 - 蓝色, 下移 -->
  <text x="600" y="260" font-family="Times New Roman, serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#003087">CERTIFICATE OF COMPLETION</text>
  
  <!-- 证书文本 - 黑色, 下移 -->
  <text x="600" y="320" font-family="Times New Roman, serif" font-size="20" text-anchor="middle" fill="#000000">The Stratford International University hereby certifies that</text>
  
  <!-- 接收者姓名 - 黑色, 斜体, 下移 -->
  <text x="600" y="370" font-family="Times New Roman, serif" font-size="38" font-weight="bold" font-style="italic" text-anchor="middle" fill="#000000">[RECIPIENT_NAME]</text>
  
  <!-- 学位文本 - 黑色, 下移 -->
  <text x="600" y="425" font-family="Times New Roman, serif" font-size="20" text-anchor="middle" fill="#000000">has fulfilled the requirements for the degree of</text>
  
  <!-- 学位名称 - 金色, 斜体, 下移 -->
  <text x="600" y="475" font-family="Times New Roman, serif" font-size="34" font-style="italic" font-weight="bold" text-anchor="middle" fill="#C19A49">[PROGRAM]</text>
  
  <!-- 附加文本 - 黑色, 下移 -->
  <text x="600" y="525" font-family="Times New Roman, serif" font-size="20" text-anchor="middle" fill="#000000">and is awarded this Certificate of Completion with all rights, privileges, and honors appertaining thereto.</text>
  
  <!-- 荣誉标签 - 金色, 斜体, 下移 -->
  <text x="600" y="565" font-family="Times New Roman, serif" font-size="22" font-style="italic" text-anchor="middle" fill="#C19A49">Cum Honore</text>
  
  <!-- 日期文本 - 黑色, 下移 -->
  <text x="600" y="605" font-family="Times New Roman, serif" font-size="20" text-anchor="middle" fill="#000000">Awarded Date</text>
  <text x="600" y="635" font-family="Times New Roman, serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#000000">[ISSUE_DATE]</text>
  
  <!-- 签名区域 - 调大签名, 调整间距 -->
  <image x="190" y="640" width="200" height="70" href="/images/signatures/president.svg" />
  <line x1="150" y1="715" x2="400" y2="715" stroke="#C19A49" stroke-width="1.5" /> 
  <text x="275" y="735" font-family="Times New Roman, serif" font-size="16" text-anchor="middle" fill="#000000">Prof. Dr. Linda Foster, University President</text>
  
  <image x="810" y="640" width="200" height="70" href="/images/signatures/director.svg" />
  <line x1="800" y1="715" x2="1050" y2="715" stroke="#C19A49" stroke-width="1.5" />
  <text x="925" y="735" font-family="Times New Roman, serif" font-size="16" text-anchor="middle" fill="#000000">Prof. Dr. James Carpenter, Director, MBA Program</text>
  
  <!-- 简单 SIU Logo -->
  <g transform="translate(600, 680)">
    <circle cx="0" cy="0" r="45" fill="#003087" />
    <circle cx="0" cy="0" r="42" fill="none" stroke="#C19A49" stroke-width="1.5" />
    <circle cx="0" cy="0" r="48" fill="none" stroke="#C19A49" stroke-width="1" />
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="40" font-weight="bold" text-anchor="middle" dominant-baseline="central" fill="#C19A49">SIU</text>
  </g>

  <!-- 证书编号 - 移到内框底部 -->
  <text x="600" y="840" font-family="Times New Roman, serif" font-size="14" text-anchor="middle" fill="#000000">Certificate ID: [CERTIFICATE_NUMBER]</text>
</svg> 