<?xml version="1.0" encoding="UTF-8"?>
<svg width="48px" height="48px" viewBox="0 0 48 48" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <!-- 毕业帽 - 主体 -->
  <g transform="translate(2, 2)">
    <!-- 帽子顶部 -->
    <polygon points="22,5 42,15 22,25 2,15" fill="#003087" stroke="#D4A017" stroke-width="1"/>
    
    <!-- 帽子底座 -->
    <rect x="18" y="25" width="8" height="2" fill="#003087" stroke="#D4A017" stroke-width="0.5"/>
    
    <!-- 帽穗 -->
    <path d="M22,27 L22,35 L25,39" fill="none" stroke="#D4A017" stroke-width="1.5"/>
    <circle cx="26" cy="40" r="2" fill="#D4A017"/>
    
    <!-- 帽子按钮 -->
    <circle cx="22" cy="5" r="2" fill="#D4A017"/>
    
    <!-- 应用按钮背景 -->
    <circle cx="34" cy="32" r="10" fill="#003087" stroke="#D4A017" stroke-width="1"/>
    
    <!-- 应用加号图标 -->
    <line x1="34" y1="28" x2="34" y2="36" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="30" y1="32" x2="38" y2="32" stroke="#FFFFFF" stroke-width="2"/>
  </g>
</svg> 