<?xml version="1.0" encoding="UTF-8"?>
<svg width="297mm" height="210mm" viewBox="0 0 297 210" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <!-- 基础背景 - 奶油色 -->
  <rect width="297" height="210" fill="#f9f5eb"/>
  
  <!-- 背景纹理 - 类似羊皮纸 -->
  <g opacity="0.05">
    <rect width="297" height="210" fill="#000000"/>
  </g>
  
  <!-- 外边框 - 典雅蓝色双边框 -->
  <rect x="8" y="8" width="281" height="194" fill="none" stroke="#00142B" stroke-width="1.8"/>
  <rect x="11" y="11" width="275" height="188" fill="none" stroke="#00142B" stroke-width="0.8"/>
  
  <!-- 装饰性角落 - 牛津风格纹章图案 -->
  <!-- 左上角 -->
  <g transform="translate(20, 20)">
    <rect x="-5" y="-5" width="15" height="15" fill="#00142B"/>
    <rect x="-3" y="-3" width="11" height="11" fill="#f9f5eb"/>
    <text x="2.5" y="5" font-family="Times New Roman, serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#00142B">O</text>
  </g>
  
  <!-- 右上角 -->
  <g transform="translate(277, 20)">
    <rect x="-10" y="-5" width="15" height="15" fill="#00142B"/>
    <rect x="-8" y="-3" width="11" height="11" fill="#f9f5eb"/>
    <text x="-2.5" y="5" font-family="Times New Roman, serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#00142B">S</text>
  </g>
  
  <!-- 左下角 -->
  <g transform="translate(20, 190)">
    <rect x="-5" y="-10" width="15" height="15" fill="#00142B"/>
    <rect x="-3" y="-8" width="11" height="11" fill="#f9f5eb"/>
    <text x="2.5" y="-2" font-family="Times New Roman, serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#00142B">U</text>
  </g>
  
  <!-- 右下角 -->
  <g transform="translate(277, 190)">
    <rect x="-10" y="-10" width="15" height="15" fill="#00142B"/>
    <rect x="-8" y="-8" width="11" height="11" fill="#f9f5eb"/>
    <text x="-2.5" y="-2" font-family="Times New Roman, serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#00142B">I</text>
  </g>
  
  <!-- 牛津校徽 -->
  <g transform="translate(148.5, 45)">
    <rect x="-30" y="-25" width="60" height="50" fill="#00142B"/>
    <rect x="-28" y="-23" width="56" height="46" fill="#f9f5eb"/>
    <text x="0" y="-5" font-family="Old English Text MT, Times New Roman, serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#00142B">SIU</text>
    <text x="0" y="10" font-family="Times New Roman, serif" font-size="8" text-anchor="middle" fill="#00142B">DOMINUS ILLUMINATIO MEA</text>
  </g>
  
  <!-- 大学名称 -->
  <text x="148.5" y="85" font-family="Trajan Pro, Times New Roman, serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#00142B">STRATFORD INTERNATIONAL UNIVERSITY</text>
  
  <!-- 证书标题 -->
  <text x="148.5" y="105" font-family="Baskerville Old Face, Times New Roman, serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#00142B">CERTIFICATE OF COMPLETION</text>
  
  <!-- 中文标题 -->
  <text x="148.5" y="115" font-family="SimSun, serif" font-size="10" text-anchor="middle" fill="#333333">毕业证书</text>
  
  <!-- 装饰分隔线 -->
  <line x1="74" y1="122" x2="223" y2="122" stroke="#00142B" stroke-width="0.8"/>
  <line x1="79" y1="124" x2="218" y2="124" stroke="#00142B" stroke-width="0.4"/>
  
  <!-- 证书内容 -->
  <text x="148.5" y="135" font-family="Baskerville Old Face, Times New Roman, serif" font-size="10" text-anchor="middle" fill="#333333">This is to certify that</text>
  
  <!-- 获得者姓名占位符 -->
  <text x="148.5" y="150" font-family="Baskerville Old Face, Times New Roman, serif" font-style="italic" font-size="16" font-weight="bold" text-anchor="middle" fill="#333333">[RECIPIENT NAME]</text>
  
  <!-- 课程说明 -->
  <text x="148.5" y="162" font-family="Baskerville Old Face, Times New Roman, serif" font-size="10" text-anchor="middle" fill="#333333">having completed all requisite coursework and examinations for</text>
  
  <!-- 课程名称占位符 -->
  <text x="148.5" y="175" font-family="Baskerville Old Face, Times New Roman, serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#00142B">[PROGRAM/DEGREE]</text>
  
  <!-- 授予学位声明 -->
  <text x="148.5" y="185" font-family="Baskerville Old Face, Times New Roman, serif" font-size="10" text-anchor="middle" fill="#333333">is hereby awarded this certificate on</text>
  
  <!-- 日期占位符 -->
  <text x="148.5" y="195" font-family="Baskerville Old Face, Times New Roman, serif" font-style="italic" font-size="12" text-anchor="middle" fill="#333333">[DATE]</text>
  
  <!-- 签名区域 -->
  <line x1="80" y1="175" x2="120" y2="175" stroke="#333333" stroke-width="0.3"/>
  <text x="100" y="180" font-family="Baskerville Old Face, Times New Roman, serif" font-size="6" font-weight="bold" text-anchor="middle" fill="#333333">Dr. Elizabeth Stratford</text>
  <text x="100" y="186" font-family="Baskerville Old Face, Times New Roman, serif" font-size="6" text-anchor="middle" fill="#333333">University President</text>
  
  <line x1="177" y1="175" x2="217" y2="175" stroke="#333333" stroke-width="0.3"/>
  <text x="197" y="180" font-family="Baskerville Old Face, Times New Roman, serif" font-size="6" font-weight="bold" text-anchor="middle" fill="#333333">Prof. Michael Sterling</text>
  <text x="197" y="186" font-family="Baskerville Old Face, Times New Roman, serif" font-size="6" text-anchor="middle" fill="#333333">Dean of Academic Affairs</text>
  
  <!-- 证书编号与验证 -->
  <text x="45" y="203" font-family="Times New Roman, serif" font-size="6" font-weight="bold" fill="#333333">Certificate ID: [CERTIFICATE-ID]</text>
  <text x="245" y="203" font-family="Times New Roman, serif" font-size="6" font-weight="bold" text-anchor="end" fill="#333333">Blockchain: [HASH]</text>
  
  <!-- 大学印章 -->
  <g transform="translate(148.5, 158)">
    <circle r="18" fill="none" stroke="#00142B" stroke-width="0.7"/>
    <circle r="16" fill="none" stroke="#00142B" stroke-width="0.4"/>
    <path d="M0,-12 L0,12 M-12,0 L12,0 M-8,-8 L8,8 M-8,8 L8,-8" stroke="#00142B" stroke-width="0.5"/>
    <text x="0" y="0" font-family="Old English Text MT, Times New Roman, serif" font-size="6" font-weight="bold" text-anchor="middle" fill="#00142B">SIU</text>
    <text x="0" y="5" font-family="Times New Roman, serif" font-size="3.5" text-anchor="middle" fill="#00142B">STRATFORD UNIVERSITY</text>
    <text x="0" y="9" font-family="Times New Roman, serif" font-size="3" text-anchor="middle" fill="#00142B">FOUNDED 2005</text>
  </g>
</svg> 